include ':app'

def localProperties = new Properties()
def localPropertiesFile = new File(rootProject.projectDir, "local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterSdkPath = localProperties.getProperty('flutter.sdk')
if (flutterSdkPath == null) {
    flutterSdkPath = System.getenv('FLUTTER_ROOT')
}
if (flutterSdkPath == null) {
    throw new GradleException("Flutter SDK not found. Define location with flutter.sdk in local.properties or with FLUTTER_ROOT in the environment.")
}

evaluate(new File("${flutterSdkPath}/packages/flutter_tools/gradle/settings_aar_plugin.gradle"))
