name: food_recognizer
description: Analisis nutrisi makanan, verifikasi kehalalan, dan resep hidangan tradisional Indonesia menggunakan Gemini AI.
version: 1.0.1
publish_to: 'none'

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Modern LiteRT package replacing the deprecated tflite_flutter
  flutter_litert: ^0.1.5
  
  # Image manipulation library for resizing and pixel conversion
  image: ^4.1.3

  # Other necessary packages for the application
  camera: ^0.11.0+2
  image_picker: ^1.1.2
  image_cropper: ^8.0.2
  google_generative_ai: ^0.4.0
  flutter_tts: ^4.1.0
  fl_chart: ^0.69.0
  shared_preferences: ^2.3.2
  http: ^1.2.2
  path_provider: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/model.tflite
    - assets/labels.txt
