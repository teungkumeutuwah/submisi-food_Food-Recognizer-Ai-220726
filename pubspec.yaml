name: food_recognizer
description: Analisis nutrisi makanan, verifikasi kehalalan, dan resep hidangan tradisional Indonesia menggunakan Gemini AI.
version: 1.0.1
publish_to: 'none'

environment:
  sdk: '>=3.12.2 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Modern LiteRT package replacing the deprecated tflite_flutter
  flutter_litert: ^3.5.1
  
  # Image manipulation library for resizing and pixel conversion
  image: ^4.2.0

  # Other necessary packages for the application
  camera: ^0.11.1
  image_picker: ^1.1.3
  image_cropper: ^12.0.0
  google_generative_ai: ^0.4.0
  flutter_tts: ^4.2.0
  fl_chart: ^1.2.0
  shared_preferences: ^2.3.3
  http: ^1.3.0
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/model.tflite
    - assets/labels.txt
