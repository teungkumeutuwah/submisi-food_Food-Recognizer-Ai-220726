name: food_recognizer
description: Analisis nutrisi makanan, verifikasi kehalalan, dan resep hidangan tradisional Indonesia menggunakan Gemini AI.
version: 1.0.1
publish_to: 'none'

environment:
  sdk: '>=3.12.2 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # TensorFlow Lite executor for on-device machine learning
  tflite_flutter: ^0.11.0
  
  # Image manipulation library for resizing and pixel conversion
  image: ^4.5.4

  # Necessary packages matching specifications
  camera: ^0.11.1
  image_picker: ^1.1.2
  image_cropper: ^9.1.0
  google_generative_ai: ^0.4.6
  flutter_tts: ^4.2.3
  fl_chart: ^1.1.0
  shared_preferences: ^2.5.2
  http: ^1.3.0
  connectivity_plus: ^6.1.4
  url_launcher: ^6.3.1
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/model.tflite
    - assets/labels.txt
