<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Fix for "Cannot set property fetch of #<Window> which has only a getter"
      // This happens when libraries (or polyfills) try to assign/override window.fetch in sandboxed iframe environments.
      (function() {
        try {
          let currentFetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            get() {
              return currentFetch;
            },
            set(newFetch) {
              currentFetch = newFetch;
            },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          console.warn("Failed to patch window.fetch:", e);
        }
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍳</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Food Recognizer AI - Analisis Nutrisi, Verifikasi Halal & Resep Tradisional</title>
  </head>
  <body class="bg-gray-50 text-gray-900 antialiased font-sans">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
